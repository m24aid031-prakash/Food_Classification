<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Food Recognition</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <h1>Restaurant Food Recognition for Calorie Estimation</h1>
      <input type="file" id="imageInput" accept="image/*">
      <div class="info-box">
        <p id="selected">Selected Image:</p>
      </div>
      <div class="image-box">
        <img id="preview" src="" alt="Preview Image" style="display: none;">
      </div>
      <button id="predictBtn">Deep Learning Prediction</button>
    </div>
    <div class="right-panel">
      <div class="info-box">
        <p id="result"></p>
        <p id="foodName">Food Name: <span style="font-weight: bold;">--</span></p>
        <p id="probability">Probability: <span>--</span></p>
      </div>

      <div class="nutrition">
        <div class="nutrient">Calories: <span id="calories">--</span></div>
        <div class="nutrient">Fat: <span id="fat">--</span></div>
        <div class="nutrient">Protein: <span id="protein">--</span></div>
        <div class="nutrient">Carbohydrate: <span id="carbs">--</span></div>
      </div>
